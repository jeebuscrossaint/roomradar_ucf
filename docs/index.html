<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RoomRadar · UCF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:     '#0e0e10',
            surface:'#18181c',
            raised: '#222228',
            border: '#2a2a32',
            gold:   '#ffc904',
            tx:     '#ededf0',
            tx2:    '#80808a',
            tx3:    '#48484f',
            free:   '#34d399',
            occ:    '#f87171',
          },
          fontFamily: {
            sans: ['Inter','system-ui','sans-serif'],
            mono: ['"JetBrains Mono"','ui-monospace','monospace'],
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { background: #0e0e10; color: #ededf0; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    select option { background: #18181c; color: #ededf0; }

    /* ── controls ── */
    .ctrl {
      background: #18181c;
      border: 1px solid #2a2a32;
      border-radius: 8px;
      color: #ededf0;
      font-size: .8125rem;
      font-family: inherit;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    .ctrl:hover  { border-color: #3a3a44; }
    .ctrl:focus  { border-color: rgba(255,201,4,.5); }

    .btn-now {
      background: #ffc904;
      color: #0e0e10;
      font-weight: 600;
      font-size: .8125rem;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-now:hover { opacity: .82; }

    /* ── tabs ── */
    .tab-btn {
      padding: 10px 16px;
      font-size: .8125rem;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      color: #80808a;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: #ededf0; }
    .tab-btn.active { color: #ffc904; border-bottom-color: #ffc904; }

    /* ── room cards ── */
    .room-card {
      background: #18181c;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      text-align: left;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .room-card:hover  { background: #1e1e24; border-color: #3a3a44; }
    .room-card:focus  { outline: none; border-color: rgba(255,201,4,.45); }
    .room-card.is-occ { border-color: rgba(248,113,113,.2); }

    /* ── status pills ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 600;
    }
    .pill-free { background: rgba(52,211,153,.1);  color: #34d399; border: 1px solid rgba(52,211,153,.18); }
    .pill-occ  { background: rgba(248,113,113,.1); color: #f87171; border: 1px solid rgba(248,113,113,.18); }

    /* ── mini timeline ── */
    .tl      { position: relative; height: 4px; border-radius: 999px; background: #222228; overflow: visible; }
    .tl-slot { position: absolute; top: 0; height: 100%; background: rgba(248,113,113,.45); border-radius: 999px; }
    .tl-free { position: absolute; top: 0; height: 100%; background: rgba(52,211,153,.3);  border-radius: 999px; }
    .tl-now  { position: absolute; top: -4px; height: 12px; width: 2px; background: #fff; border-radius: 1px; box-shadow: 0 0 4px rgba(255,255,255,.5); }

    /* ── week calendar ── */
    .wk-wrap { overflow: auto; }
    .wk-grid { display: grid; grid-template-columns: 32px repeat(5,1fr); min-width: 280px; }
    .wk-head-cell {
      font-size: .65rem; font-weight: 600; text-align: center;
      padding: 5px 2px; color: #80808a;
      position: sticky; top: 0; z-index: 2;
      border-bottom: 1px solid #2a2a32;
    }
    .wk-head-cell.today { color: #ededf0; }
    .wk-time-col  { color: #48484f; font-size: .6rem; text-align: right; padding-right: 5px; line-height: 1; user-select: none; }
    .wk-hour-line { position: absolute; left: 0; right: 0; height: 1px; background: #1c1c22; }
    .wk-occ {
      position: absolute; left: 2px; right: 2px;
      background: rgba(248,113,113,.18);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 4px; font-size: .6rem; color: #f87171;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-weight: 600;
    }
    .wk-now-line {
      position: absolute; left: 0; right: 0;
      height: 2px; background: #ffc904; border-radius: 1px;
      z-index: 3; box-shadow: 0 0 6px rgba(255,201,4,.5);
    }
    .wk-now-dot {
      position: absolute; width: 6px; height: 6px; border-radius: 50%;
      background: #ffc904; left: -3px; top: -2px;
    }

    /* ── sheet animation ── */
    .sheet-enter { animation: slideUp .2s cubic-bezier(.4,0,.2,1); }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>

<script>
const DAY_CODES = ['U','M','T','W','R','F','S'];
const DAY_NAMES = {M:'Monday',T:'Tuesday',W:'Wednesday',R:'Thursday',F:'Friday',S:'Saturday',U:'Sunday'};
const DAY_SHORT = {M:'Mon',T:'Tue',W:'Wed',R:'Thu',F:'Fri',S:'Sat',U:'Sun'};
const WK_DAYS   = ['M','T','W','R','F'];
const TL_S = 7*60, TL_E = 22*60;
const PX_PER_MIN = 390 / (TL_E - TL_S);

const toMin  = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
const toAmPm = m => { const h=Math.floor(m/60),mn=m%60; return `${h%12||12}:${String(mn).padStart(2,'0')} ${h<12?'AM':'PM'}`; };
const fmtDur = m => { if(!m&&m!==0)return'rest of day'; const h=Math.floor(m/60),mn=m%60; return h&&mn?`${h}h ${mn}m`:h?`${h}h`:`${mn}m`; };
const todayCode = () => DAY_CODES[new Date().getDay()];
const nowHHMM   = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };

let allRooms={}, buildings=[], scrapedAt='', sheetRoom=null;
let mapLocations={};  // building-code → map URL, populated from locations.json

// ── map locations (fetch UCF map API to enable deep-linking) ──────────────
async function loadMapLocations() {
  try {
    const res  = await fetch('https://map.ucf.edu/locations.json');
    if(!res.ok) return;
    const locs = await res.json();
    // Build a lookup: normalized name → map URL
    // UCF schedule uses codes like "ENG2", "BA2", "NSC" — try to match them
    const idx = {};
    (locs||[]).forEach(loc => {
      if(!loc.profile_link) return;
      // index by uppercased abbreviation, name words, and slug fragments
      const slug = (loc.profile_link||'').split('/').filter(Boolean).pop()||'';
      idx[slug.toUpperCase()] = loc.profile_link;
      if(loc.abbreviation) idx[loc.abbreviation.toUpperCase()] = loc.profile_link;
      // also try first letters of each word in name for acronym matching
    });
    mapLocations = idx;
  } catch(_) { /* map links just won't show */ }
}

function mapUrlForBuilding(buildingCode) {
  if(!buildingCode) return null;
  const code = buildingCode.toUpperCase();
  if(mapLocations[code]) return `https://map.ucf.edu${mapLocations[code]}`;
  // try partial slug matches
  for(const [k,v] of Object.entries(mapLocations)) {
    if(k.startsWith(code) || code.startsWith(k)) return `https://map.ucf.edu${v}`;
  }
  return null;
}

// ── tab switching ─────────────────────────────────────────────────────────
function switchTab(tab) {
  const isRooms = tab === 'rooms';
  document.getElementById('view-rooms').classList.toggle('hidden', !isRooms);
  document.getElementById('view-map').classList.toggle('hidden',   isRooms);
  document.getElementById('tab-rooms').classList.toggle('active',  isRooms);
  document.getElementById('tab-map').classList.toggle('active',   !isRooms);
}

// ── free rooms logic ──────────────────────────────────────────────────────
function findFree(day, qMin, bld, minFree) {
  return Object.values(allRooms)
    .filter(r => !bld || r.building===bld)
    .map(r => {
      const slots = r.slots.filter(s=>s.days.includes(day));
      const occ   = slots.find(s=>toMin(s.start)<=qMin && qMin<toMin(s.end));
      if(occ) return null;
      const future = slots.map(s=>toMin(s.start)).filter(t=>t>qMin).sort((a,b)=>a-b);
      const nxt    = future.length ? future[0] : null;
      const dur    = nxt!==null ? nxt-qMin : null;
      if(minFree>0 && dur!==null && dur<minFree) return null;
      return {...r, freeUntil: nxt!==null?toAmPm(nxt):null, duration:dur};
    })
    .filter(Boolean)
    .sort((a,b)=>{
      if(a.duration===null&&b.duration===null) return 0;
      if(a.duration===null) return 1; if(b.duration===null) return -1;
      return b.duration-a.duration;
    });
}

// ── card mini-timeline ────────────────────────────────────────────────────
function buildMiniTl(room, day, qMin) {
  const range   = TL_E - TL_S;
  const slots   = room.slots.filter(s=>s.days.includes(day));
  const nowPct  = Math.max(0,Math.min(100,(qMin-TL_S)/range*100));
  const future  = slots.map(s=>toMin(s.start)).filter(t=>t>qMin).sort((a,b)=>a-b);
  const freeEnd = future.length ? future[0] : TL_E;
  const freeL   = Math.max(0,(qMin-TL_S)/range*100);
  const freeW   = Math.max(0,(freeEnd-qMin)/range*100);
  let html = `<div class="tl-free" style="left:${freeL}%;width:${freeW}%"></div>`;
  slots.forEach(s=>{
    const l = Math.max(0,(toMin(s.start)-TL_S)/range*100);
    const w = Math.min(100-l,(toMin(s.end)-toMin(s.start))/range*100);
    html += `<div class="tl-slot" style="left:${l}%;width:${w}%"></div>`;
  });
  html += `<div class="tl-now" style="left:${nowPct}%"></div>`;
  return html;
}

// ── rooms dropdown ────────────────────────────────────────────────────────
function populateRooms(bld) {
  const sel = document.getElementById('f-room');
  sel.innerHTML = '<option value="">All rooms</option>';
  if(!bld) return;
  Object.values(allRooms).filter(r=>r.building===bld).map(r=>r.room).sort()
    .forEach(rm=>{ const o=document.createElement('option'); o.value=o.textContent=rm; sel.appendChild(o); });
}

// ── update "view on map" link ─────────────────────────────────────────────
function updateMapLink(bld) {
  const link = document.getElementById('map-building-link');
  if(!bld) { link.classList.add('hidden'); return; }
  const url = mapUrlForBuilding(bld);
  link.href = url || 'https://map.ucf.edu/';
  link.classList.remove('hidden');
}

// ── render ────────────────────────────────────────────────────────────────
function render() {
  const bld     = document.getElementById('f-building').value;
  const roomSel = document.getElementById('f-room').value;
  const day     = document.getElementById('f-day').value;
  const qMin    = toMin(document.getElementById('f-time').value);
  const minFree = parseInt(document.getElementById('f-minfree').value)||0;
  const roomMode= !!roomSel;

  let rows;
  if(roomMode) {
    const r = allRooms[`${bld}-${roomSel}`] ||
              Object.values(allRooms).find(r=>r.building===bld&&r.room===roomSel);
    if(!r) { rows=[]; }
    else {
      const slots = r.slots.filter(s=>s.days.includes(day));
      const occ   = slots.find(s=>toMin(s.start)<=qMin&&qMin<toMin(s.end));
      if(occ) rows=[{...r,occupied:true,  freeUntil:toAmPm(toMin(occ.end)), duration:toMin(occ.end)-qMin, currentSlot:occ}];
      else {
        const future = slots.map(s=>toMin(s.start)).filter(t=>t>qMin).sort((a,b)=>a-b);
        const nxt    = future.length?future[0]:null;
        rows=[{...r,occupied:false,freeUntil:nxt?toAmPm(nxt):null,duration:nxt?nxt-qMin:null}];
      }
    }
    document.getElementById('status').textContent = `${bld} ${roomSel} — ${DAY_NAMES[day]} at ${toAmPm(qMin)}`;
    document.getElementById('result-count').textContent = '';
  } else {
    rows = findFree(day,qMin,bld,minFree);
    document.getElementById('status').textContent = `Free rooms — ${DAY_NAMES[day]} at ${toAmPm(qMin)}`;
    document.getElementById('result-count').textContent = `${rows.length} room${rows.length!==1?'s':''}`;
  }

  const grid = document.getElementById('results');
  grid.innerHTML = '';
  if(!rows.length) {
    grid.innerHTML=`<p class="col-span-full text-center py-16 text-[14px]" style="color:#80808a;">No rooms found.</p>`;
    return;
  }

  rows.forEach(r=>{
    const isOcc = roomMode && r.occupied;
    const btn   = document.createElement('button');
    btn.className = `room-card ${isOcc?'is-occ':''}`;

    const pillHtml = isOcc
      ? `<span class="pill pill-occ">occupied</span>`
      : `<span class="pill pill-free">${r.freeUntil ? fmtDur(r.duration) : 'all day'}</span>`;

    const descHtml = isOcc
      ? `Free at ${r.freeUntil} · ${fmtDur(r.duration)} left`
      : r.freeUntil
        ? `Until ${r.freeUntil}`
        : 'No more classes today';

    const cs = isOcc && r.currentSlot;
    const courseHtml = cs && cs.course
      ? `<div style="font-size:.75rem;line-height:1.3;margin-top:-2px;">
           <span style="color:#ffc904;font-weight:600;">${cs.course}</span>
           ${cs.title ? `<span style="color:#80808a;"> · ${cs.title}</span>` : ''}
         </div>`
      : '';

    btn.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;">
        <span style="font-size:.75rem;color:#80808a;font-weight:500;letter-spacing:.01em;">${r.building}</span>
        ${pillHtml}
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.25rem;line-height:1;color:#ededf0;">${r.room}</span>
      ${courseHtml}
      <div class="tl">${buildMiniTl(r,day,qMin)}</div>
      <span style="font-size:.7rem;color:#80808a;">${descHtml}</span>
    `;
    btn.addEventListener('click', ()=>openSheet(r,day,qMin));
    grid.appendChild(btn);
  });
}

// ── detail sheet ──────────────────────────────────────────────────────────
function openSheet(room, day, qMin) {
  sheetRoom = room;
  buildSheet(day, qMin);
  document.getElementById('sheet-backdrop').classList.remove('hidden');
  const s = document.getElementById('sheet');
  s.classList.remove('hidden');
  s.classList.add('sheet-enter');
  setTimeout(()=>s.classList.remove('sheet-enter'), 200);
}

function buildSheet(day, qMin) {
  const r = sheetRoom;

  document.getElementById('sheet-title').textContent = `${r.building} ${r.room}`;
  document.getElementById('sheet-sub').textContent   = `${DAY_NAMES[day]} at ${toAmPm(qMin)}`;

  // update map link for this building
  const mapUrl = mapUrlForBuilding(r.building);
  const sheetMapLink = document.getElementById('sheet-map-link');
  sheetMapLink.href = mapUrl || 'https://map.ucf.edu/';

  const isToday = day===todayCode();
  const nowMin  = isToday ? qMin : -1;
  const slots   = (r.slots||[]).filter(s=>s.days.includes(day)).sort((a,b)=>toMin(a.start)-toMin(b.start));
  const occ     = slots.find(s=>toMin(s.start)<=nowMin&&nowMin<toMin(s.end));
  const future  = slots.filter(s=>toMin(s.start)>nowMin);

  let st;
  if(!isToday)           st = '';
  else if(occ)           st = `<span style="color:#f87171;">Occupied</span>${occ.course ? ` · <span style="color:#ffc904;font-weight:600;">${occ.course}</span>${occ.title ? `<span style="color:#80808a;font-weight:400;"> · ${occ.title}</span>` : ''}` : ''} · free at ${toAmPm(toMin(occ.end))} (${fmtDur(toMin(occ.end)-nowMin)})`;
  else if(future.length) st = `<span style="color:#34d399;">Free</span> · next class ${toAmPm(toMin(future[0].start))} (${fmtDur(toMin(future[0].start)-nowMin)})${future[0].course ? ` — <span style="color:#ffc904;font-weight:600;">${future[0].course}</span>` : ''}`;
  else if(slots.length)  st = `<span style="color:#34d399;">Free</span> · no more classes today`;
  else                   st = `<span style="color:#34d399;">Free all day</span>`;
  document.getElementById('sheet-status').innerHTML = st;

  // today highlight
  WK_DAYS.forEach(d=>{
    const el = document.getElementById('wk-h-'+d);
    if(el) el.classList.toggle('today', d===todayCode());
  });

  // build week calendar body
  const body = document.getElementById('wk-body');
  body.innerHTML = '';

  // hour grid lines + time labels
  for(let h=0; h<=(TL_E-TL_S)/60; h++){
    const t = TL_S + h*60;
    if(t>TL_E) break;
    const top = (t-TL_S)*PX_PER_MIN;
    if(h>0){
      const lbl = document.createElement('div');
      lbl.className = 'wk-time-col absolute';
      lbl.style.cssText = `top:${top-6}px;left:0;width:30px;`;
      lbl.textContent = toAmPm(t).replace(':00','').replace(' AM','a').replace(' PM','p');
      body.appendChild(lbl);
    }
    WK_DAYS.forEach((_,i)=>{
      const line = document.createElement('div');
      line.className = 'wk-hour-line absolute';
      line.style.cssText = `top:${top}px;left:calc(32px + ${i} * (100% - 32px) / 5);width:calc((100% - 32px) / 5);`;
      body.appendChild(line);
    });
  }

  // occupied blocks + "now" line
  WK_DAYS.forEach((d,i)=>{
    const colL = `calc(32px + ${i} * (100% - 32px) / 5)`;
    const colW = `calc((100% - 32px) / 5)`;

    (r.slots||[]).filter(s=>s.days.includes(d)).forEach(s=>{
      const top = (toMin(s.start)-TL_S)*PX_PER_MIN;
      const ht  = (toMin(s.end)-toMin(s.start))*PX_PER_MIN;
      const blk = document.createElement('div');
      blk.className = 'wk-occ absolute';
      blk.style.cssText = `top:${top}px;height:${ht}px;left:${colL};width:${colW};padding:2px 3px;`;
      if(ht>18) blk.textContent = s.course || toAmPm(toMin(s.start)).replace(':00','').replace(' AM','a').replace(' PM','p');
      body.appendChild(blk);
    });

    if(d===todayCode() && isToday){
      const nowTop = (qMin-TL_S)*PX_PER_MIN;
      if(nowTop>=0 && nowTop<=390){
        const line = document.createElement('div');
        line.className = 'wk-now-line absolute';
        line.style.cssText = `top:${nowTop}px;left:${colL};width:${colW};`;
        const dot = document.createElement('div');
        dot.className = 'wk-now-dot';
        line.appendChild(dot);
        body.appendChild(line);
      }
    }
  });

  // all class times list
  const DAY_ORD = ['M','T','W','R','F','S','U'];
  const ul = document.getElementById('sheet-list');
  ul.innerHTML = '';
  const all = (r.slots||[]).slice().sort((a,b)=>toMin(a.start)-toMin(b.start));
  if(!all.length){
    ul.innerHTML=`<li class="text-[13px]" style="color:#80808a;">No classes scheduled.</li>`;
  } else {
    all.forEach(s=>{
      const days = s.days.slice().sort((a,b)=>DAY_ORD.indexOf(a)-DAY_ORD.indexOf(b))
                         .map(d=>DAY_SHORT[d]||d).join(' · ');
      const li = document.createElement('li');
      li.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;border-radius:10px;padding:10px 14px;background:#111116;';
      const left = s.course
        ? `<div>
             <div style="font-size:.75rem;margin-bottom:2px;">
               <span style="color:#ffc904;font-weight:600;">${s.course}</span>
               ${s.title ? `<span style="color:#80808a;"> · ${s.title}</span>` : ''}
             </div>
             <span class="font-mono" style="font-size:.8125rem;">${toAmPm(toMin(s.start))} – ${toAmPm(toMin(s.end))}</span>
           </div>`
        : `<span class="font-mono" style="font-size:.8125rem;">${toAmPm(toMin(s.start))} – ${toAmPm(toMin(s.end))}</span>`;
      li.innerHTML = `${left}<span style="color:#80808a;font-size:.75rem;white-space:nowrap;">${days}</span>`;
      ul.appendChild(li);
    });
  }
}

function closeSheet(){
  document.getElementById('sheet').classList.add('hidden');
  document.getElementById('sheet-backdrop').classList.add('hidden');
  sheetRoom = null;
}

// ── clock ─────────────────────────────────────────────────────────────────
function tickClock(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes();
  document.getElementById('live-time').textContent =
    `${DAY_SHORT[todayCode()]} ${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
}

// ── init ──────────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('f-day').value  = todayCode();
  document.getElementById('f-time').value = nowHHMM();

  document.getElementById('f-building').addEventListener('change',()=>{
    const bld = document.getElementById('f-building').value;
    populateRooms(bld);
    updateMapLink(bld);
    render();
  });
  ['f-room','f-day','f-minfree'].forEach(id=>document.getElementById(id).addEventListener('change',render));
  document.getElementById('f-time').addEventListener('input',render);
  document.getElementById('btn-now').addEventListener('click',()=>{
    document.getElementById('f-day').value  = todayCode();
    document.getElementById('f-time').value = nowHHMM();
    render();
  });

  tickClock();
  setInterval(tickClock, 10000);

  // load map locations in background (non-blocking)
  loadMapLocations();

  try {
    const res  = await fetch('./schedule.json');
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    allRooms  = data.rooms  || {};
    scrapedAt = data.scraped_at || '';
    buildings = [...new Set(Object.values(allRooms).map(r=>r.building))];
    const bSel = document.getElementById('f-building');
    buildings.sort().forEach(b=>{
      const o=document.createElement('option'); o.value=o.textContent=b; bSel.appendChild(o);
    });
    if(scrapedAt){
      const ago = Math.floor((Date.now()-new Date(scrapedAt))/86400000);
      document.getElementById('data-age').textContent =
        `Updated ${ago===0?'today':ago===1?'yesterday':ago+' days ago'}`;
    }
    render();
  } catch(e){
    document.getElementById('status').textContent = 'Failed to load data.';
    document.getElementById('error-banner').classList.remove('hidden');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
